<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <title>Panel Admin - MultiShop CCS</title>
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen p-4 md:p-6" onload="checkLogin()">

    <div id="login-screen" class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center mx-auto mt-20">
        <h2 class="text-2xl font-black mb-6 text-slate-800">Acceso Admin</h2>
        <input type="password" id="pass" placeholder="Contraseña secreta" class="w-full border-2 p-3 rounded-xl mb-4 text-center outline-none focus:border-blue-500 font-bold">
        <button onclick="entrar()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg">Entrar al Sistema</button>
    </div>

    <div id="admin-panel" class="hidden w-full max-w-6xl mx-auto space-y-4 md:space-y-6">
        
        <div class="flex justify-between items-center bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 sticky top-0 z-20">
            <h2 class="text-xl md:text-2xl font-black text-blue-600"><i class="fa-solid fa-gauge-high"></i> Panel de Gestión</h2>
            <button onclick="cerrarSesion()" class="text-red-500 hover:text-red-700 font-bold text-sm bg-red-50 px-3 py-2 md:px-4 md:py-2 rounded-lg"><i class="fa-solid fa-right-from-bracket"></i> Salir</button>
        </div>

        <div class="flex lg:hidden bg-white p-2 rounded-2xl shadow-sm gap-2 border border-slate-200 sticky top-20 z-10">
            <button onclick="mostrarPestana('inventario')" id="tab-inventario" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-black text-xs md:text-sm shadow-md transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-boxes-stacked"></i> Inventario
            </button>
            <button onclick="mostrarPestana('formulario')" id="tab-formulario" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs md:text-sm hover:bg-slate-200 transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> Añadir / Editar
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div id="col-formulario" class="hidden lg:block bg-white p-5 md:p-8 rounded-3xl shadow-xl lg:col-span-1 h-fit sticky top-6 border border-slate-200">
                <h3 id="form-titulo" class="text-xl font-black mb-6 text-slate-800"><i class="fa-solid fa-upload"></i> Subir Producto</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="font-bold text-xs text-slate-500 uppercase">Nombre</label>
                        <input type="text" id="nombre" class="w-full border-2 p-2.5 rounded-xl focus:border-blue-500 outline-none text-sm font-medium">
                    </div>

                    <div class="grid grid-cols-2 gap-3 bg-purple-50 p-3 rounded-xl border border-purple-100">
                        <div>
                            <label class="font-bold text-[10px] text-slate-500 uppercase">Tipo Venta</label>
                            <select id="tipo_venta" class="w-full border-2 p-2 rounded-xl focus:border-purple-500 outline-none text-sm font-bold text-purple-700 bg-white">
                                <option value="stock">Stock Inmediato</option>
                                <option value="preventa">Próximamente</option>
                            </select>
                        </div>
                        <div>
                            <label class="font-bold text-[10px] text-slate-500 uppercase">Reserva ($)</label>
                            <input type="number" id="reserva" placeholder="Ej: 10" class="w-full border-2 p-2 rounded-xl focus:border-purple-500 outline-none text-sm font-bold text-purple-600">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 bg-blue-50 p-3 rounded-xl border border-blue-100">
                        <div>
                            <label class="font-bold text-[10px] text-slate-500 uppercase">Total ($)</label>
                            <input type="number" id="precio" class="w-full border-2 p-2 rounded-xl focus:border-blue-500 outline-none text-sm font-bold text-blue-600">
                        </div>
                        <div>
                            <label class="font-bold text-[10px] text-slate-500 uppercase">Antes ($)</label>
                            <input type="number" id="precio_viejo" placeholder="Opcional" class="w-full border-2 p-2 rounded-xl focus:border-slate-500 outline-none text-sm font-medium text-slate-400">
                        </div>
                        <div class="col-span-2">
                            <label class="font-bold text-[10px] text-slate-500 uppercase">Bolívares (Bs)</label>
                            <input type="number" id="precio_bs" placeholder="Opcional" class="w-full border-2 p-2 rounded-xl focus:border-blue-500 outline-none text-sm font-bold text-teal-600">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="font-bold text-xs text-slate-500 uppercase">Stock</label>
                            <input type="number" id="stock" class="w-full border-2 p-2 rounded-xl focus:border-blue-500 outline-none text-sm font-medium">
                        </div>
                        <div>
                            <label class="font-bold text-xs text-slate-500 uppercase">Categoría</label>
                            <input type="text" id="categoria" list="sugerencias-cat" class="w-full border-2 p-2 rounded-xl focus:border-blue-500 outline-none text-sm font-medium">
                            <datalist id="sugerencias-cat">
                                <option value="Electrónica">
                                <option value="Accesorios Moto">
                                <option value="Computación">
                            </datalist>
                        </div>
                    </div>
                    
                    <div>
                        <label class="font-bold text-xs text-slate-500 uppercase">Descripción</label>
                        <textarea id="descripcion" rows="2" class="w-full border-2 p-2 rounded-xl focus:border-blue-500 outline-none text-sm font-medium"></textarea>
                    </div>
                    
                    <div class="space-y-3 pt-2">
                        <div>
                            <label class="font-bold text-xs text-slate-500 uppercase flex justify-between">Fotos <span class="text-blue-500"><i class="fa-solid fa-images"></i></span></label>
                            <p id="aviso-foto" class="text-[10px] text-amber-600 hidden mb-1 font-bold">*Déjalo vacío si mantienes las fotos actuales.</p>
                            <input type="file" id="foto" accept="image/*" multiple class="w-full border-2 border-dashed border-blue-200 p-2 rounded-xl text-xs bg-blue-50 cursor-pointer">
                        </div>
                        <div>
                            <label class="font-bold text-xs text-slate-500 uppercase flex justify-between">Video <span class="text-purple-500"><i class="fa-solid fa-video"></i></span></label>
                            <p id="aviso-video" class="text-[10px] text-amber-600 hidden mb-1 font-bold">*Déjalo vacío si mantienes el video actual.</p>
                            <input type="file" id="video" accept="video/*" class="w-full border-2 border-dashed border-purple-200 p-2 rounded-xl text-xs bg-purple-50 cursor-pointer">
                        </div>
                    </div>
                    
                    <button id="btn-subir" onclick="guardarProducto()" class="w-full bg-green-500 text-white font-black py-4 rounded-xl hover:bg-green-600 transition shadow-lg mt-4 flex justify-center items-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Publicar
                    </button>
                    <button id="btn-cancelar" onclick="cancelarEdicion()" class="w-full bg-slate-200 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-300 transition hidden">
                        Cancelar Edición
                    </button>
                </div>
            </div>

            <div id="col-inventario" class="block lg:block bg-white p-5 md:p-8 rounded-3xl shadow-xl lg:col-span-2 border border-slate-200">
                <h3 class="text-xl font-black mb-6 text-slate-800"><i class="fa-solid fa-boxes-stacked"></i> Inventario Actual</h3>
                
                <div class="overflow-x-auto no-scrollbar pb-4">
                    <table class="w-full text-left border-collapse min-w-[500px]">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 text-[10px] md:text-xs uppercase tracking-widest border-b border-slate-200">
                                <th class="p-3 rounded-tl-xl w-1/2">Producto</th>
                                <th class="p-3">Precio</th>
                                <th class="p-3">Stock</th>
                                <th class="p-3 rounded-tr-xl text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="lista-inventario" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const IMGBB_API_KEY = "62e56d7f96d9dde814e8d8383a2d388e";
        const firebaseConfig = {
            apiKey: "AIzaSyABStoQHx1eP1UjdwM6XDcHfJk32SZjVdw",
            authDomain: "multishopccs-56e08.firebaseapp.com",
            projectId: "multishopccs-56e08",
            storageBucket: "multishopccs-56e08.firebasestorage.app", 
            appId: "1:254285227786:web:16e1f815b3a15d6e607cf3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let idEdicion = null; 
        let fotosAntiguas = []; 
        let videoAntiguo = null;
        let inventarioGlobal = {}; 

        function mostrarPestana(pestana) {
            if(window.innerWidth >= 1024) return; 

            const colForm = document.getElementById('col-formulario');
            const colInv = document.getElementById('col-inventario');
            const btnForm = document.getElementById('tab-formulario');
            const btnInv = document.getElementById('tab-inventario');

            if(pestana === 'formulario') {
                colForm.classList.remove('hidden'); colInv.classList.add('hidden');
                btnForm.classList.replace('bg-slate-100', 'bg-blue-600'); btnForm.classList.replace('text-slate-500', 'text-white'); btnForm.classList.replace('font-bold', 'font-black');
                btnInv.classList.replace('bg-blue-600', 'bg-slate-100'); btnInv.classList.replace('text-white', 'text-slate-500'); btnInv.classList.replace('font-black', 'font-bold');
            } else {
                colForm.classList.add('hidden'); colInv.classList.remove('hidden');
                btnInv.classList.replace('bg-slate-100', 'bg-blue-600'); btnInv.classList.replace('text-slate-500', 'text-white'); btnInv.classList.replace('font-bold', 'font-black');
                btnForm.classList.replace('bg-blue-600', 'bg-slate-100'); btnForm.classList.replace('text-white', 'text-slate-500'); btnForm.classList.replace('font-black', 'font-bold');
            }
        }

        function checkLogin() {
            if(localStorage.getItem('adminLogged') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                cargarInventario(); 
            }
        }

        function entrar() {
            if(document.getElementById('pass').value === 'adminjasson1202') {
                localStorage.setItem('adminLogged', 'true');
                checkLogin();
            } else { Swal.fire('Error', 'Contraseña incorrecta', 'error'); }
        }

        function cerrarSesion() { localStorage.removeItem('adminLogged'); window.location.reload(); }

        function cargarInventario() {
            db.collection("inventario").orderBy("fecha", "desc").onSnapshot((snapshot) => {
                const lista = document.getElementById('lista-inventario');
                lista.innerHTML = '';
                inventarioGlobal = {}; 
                
                if(snapshot.empty) {
                    lista.innerHTML = '<tr><td colspan="4" class="text-center py-6 text-slate-400 font-bold">No hay productos.</td></tr>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const prod = doc.data();
                    inventarioGlobal[doc.id] = prod; 
                    const primeraFoto = prod.imagenes ? prod.imagenes[0] : (prod.imagen || "https://via.placeholder.com/150");
                    const iconVideo = prod.video ? '<i class="fa-solid fa-video text-purple-500 ml-1" title="Tiene Video"></i>' : '';
                    
                    let detallePrecios = `<span class="text-blue-600 font-black">$${prod.precio}</span>`;
                    if(prod.tipo === 'preventa') detallePrecios += `<br><span class="text-[9px] text-purple-600 font-bold bg-purple-50 px-1 rounded block mt-1">Reserva: $${prod.reserva}</span>`;

                    let etiquetaTipo = prod.tipo === 'preventa' 
                        ? `<span class="text-[9px] bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded uppercase tracking-wider font-bold">Prev</span>`
                        : `<span class="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded uppercase tracking-wider font-bold">Stock</span>`;

                    lista.innerHTML += `
                        <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                            <td class="p-3 text-slate-800 flex items-center gap-3">
                                <img src="${primeraFoto}" class="w-10 h-10 md:w-12 md:h-12 rounded-lg object-cover shadow-sm border border-slate-200">
                                <div class="truncate w-32 md:w-48 text-xs md:text-sm font-bold">
                                    ${prod.nombre} ${iconVideo} <br>
                                    <div class="mt-1 flex items-center gap-1">
                                        ${etiquetaTipo} <span class=\"text-[9px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded uppercase tracking-wider\">${prod.categoria}</span>
                                    </div>
                                </div>
                            </td>
                            <td class="p-3">${detallePrecios}</td>
                            <td class="p-3"><span class="bg-slate-800 text-white font-black px-2 py-1 rounded-md text-xs shadow-sm">${prod.stock || 0}</span></td>
                            <td class="p-3 text-center">
                                <button onclick="prepararEdicion('${doc.id}')" class="text-white bg-blue-500 hover:bg-blue-600 w-8 h-8 rounded-lg transition mr-1 shadow-sm"><i class="fa-solid fa-pen text-xs"></i></button>
                                <button onclick="eliminarProducto('${doc.id}')" class="text-white bg-red-500 hover:bg-red-600 w-8 h-8 rounded-lg transition shadow-sm"><i class="fa-solid fa-trash text-xs"></i></button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        async function guardarProducto() {
            const btn = document.getElementById('btn-subir');
            const nombre = document.getElementById('nombre').value.trim();
            const tipo_venta = document.getElementById('tipo_venta').value;
            const reserva = document.getElementById('reserva').value;
            const precio = document.getElementById('precio').value;
            const precioViejo = document.getElementById('precio_viejo').value;
            const precioBs = document.getElementById('precio_bs').value;
            const stock = document.getElementById('stock').value;
            const categoria = document.getElementById('categoria').value.trim();
            const descripcion = document.getElementById('descripcion').value.trim();
            const archivosFotos = document.getElementById('foto').files; 
            const archivoVideo = document.getElementById('video').files[0];

            if(!nombre || !precio || !stock || !categoria) { Swal.fire('Faltan Datos', 'Completa los campos principales.', 'warning'); return; }
            if(tipo_venta === 'preventa' && !reserva) { Swal.fire('Falta Reserva', 'Indica el monto para apartar.', 'warning'); return; }
            if(!idEdicion && archivosFotos.length === 0) { Swal.fire('Falta Imagen', 'Sube al menos una foto.', 'warning'); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando...';

            try {
                let urlsFinales = (idEdicion && archivosFotos.length === 0) ? fotosAntiguas : []; 
                if(archivosFotos.length > 0) {
                    urlsFinales = []; 
                    for(let i = 0; i < archivosFotos.length; i++) {
                        btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Subiendo foto ${i+1}...`;
                        const formData = new FormData();
                        formData.append("image", archivosFotos[i]);
                        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                        const data = await response.json();
                        urlsFinales.push(data.data.url);
                    }
                }

                let urlVideoFinal = idEdicion ? videoAntiguo : null;
                if(archivoVideo) {
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Subiendo Video...';
                    const storageRef = storage.ref(`videos/${Date.now()}_${archivoVideo.name}`);
                    await storageRef.put(archivoVideo);
                    urlVideoFinal = await storageRef.getDownloadURL();
                }

                const dataProducto = {
                    nombre, tipo: tipo_venta,
                    reserva: reserva ? parseFloat(reserva) : 0,
                    precio: parseFloat(precio), 
                    precioViejo: precioViejo ? parseFloat(precioViejo) : null,
                    precioBs: precioBs ? parseFloat(precioBs) : null,
                    stock: parseInt(stock), categoria, descripcion, 
                    imagenes: urlsFinales, video: urlVideoFinal
                };

                if(idEdicion) {
                    await db.collection('inventario').doc(idEdicion).update(dataProducto);
                    Swal.fire({ title: '¡Actualizado!', icon: 'success', timer: 1500, showConfirmButton: false });
                } else {
                    dataProducto.fecha = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('inventario').add(dataProducto);
                    Swal.fire({ title: '¡Publicado!', icon: 'success', timer: 1500, showConfirmButton: false });
                }
                cancelarEdicion();
            } catch(e) { 
                Swal.fire('Error', 'Problema al guardar.', 'error');
            } finally { 
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Publicar'; 
                btn.disabled = false; 
            }
        }

        function prepararEdicion(id) {
            const prod = inventarioGlobal[id]; 
            idEdicion = id;
            fotosAntiguas = prod.imagenes ? prod.imagenes : (prod.imagen ? [prod.imagen] : []);
            videoAntiguo = prod.video || null;
            
            document.getElementById('form-titulo').innerHTML = '<i class="fa-solid fa-pen text-amber-500"></i> Editando Producto';
            document.getElementById('btn-subir').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Guardar Cambios';
            document.getElementById('btn-cancelar').classList.remove('hidden');
            document.getElementById('aviso-foto').classList.remove('hidden');

            document.getElementById('nombre').value = prod.nombre;
            document.getElementById('tipo_venta').value = prod.tipo || 'stock';
            document.getElementById('reserva').value = prod.reserva || '';
            document.getElementById('precio').value = prod.precio;
            document.getElementById('precio_viejo').value = prod.precioViejo || '';
            document.getElementById('precio_bs').value = prod.precioBs || '';
            document.getElementById('stock').value = prod.stock || 0;
            document.getElementById('categoria').value = prod.categoria || '';
            document.getElementById('descripcion').value = prod.descripcion;
            
            mostrarPestana('formulario');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarEdicion() {
            idEdicion = null;
            document.getElementById('form-titulo').innerHTML = '<i class="fa-solid fa-upload"></i> Subir Producto';
            document.getElementById('btn-subir').innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Publicar';
            document.getElementById('btn-cancelar').classList.add('hidden');
            document.getElementById('aviso-foto').classList.add('hidden');
            ['nombre','reserva','precio','precio_viejo','precio_bs','stock','categoria','descripcion','foto','video'].forEach(id => document.getElementById(id).value = '');
            mostrarPestana('inventario');
        }

        function eliminarProducto(id) {
            Swal.fire({
                title: '¿Eliminar producto?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Sí, eliminar'
            }).then((result) => {
                if (result.isConfirmed) {
                    db.collection("inventario").doc(id).delete().then(() => {
                        Swal.fire({ title: 'Eliminado', icon: 'success', timer: 1500, showConfirmButton: false });
                    });
                }
            });
        }
    </script>
</body>
</html>
